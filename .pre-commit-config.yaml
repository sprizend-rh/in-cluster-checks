default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        files: ^src/in_cluster_checks/
      - id: end-of-file-fixer
        files: ^src/in_cluster_checks/
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        files: ^src/in_cluster_checks/

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=120']
        files: ^src/in_cluster_checks/

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        language_version: python3
        files: ^src/in_cluster_checks/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '120']
        language_version: python3
        files: ^src/in_cluster_checks/

  - repo: local
    hooks:
      - id: no-function-imports
        name: check no imports inside functions
        entry: python tests/linters/check_no_function_imports.py
        language: system
        types: [python]
        files: ^src/in_cluster_checks/

      - id: safe-cmd-string-check
        name: check SafeCmdString usage
        entry: python tests/linters/check_safe_cmd_string.py
        language: system
        types: [python]
        files: ^src/in_cluster_checks/

      - id: pytest-coverage
        name: pytest with coverage
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        args: ['tests/', '--cov=src/in_cluster_checks', '--cov-report=term-missing', '--cov-report=html', '--cov-report=xml', '--cov-fail-under=80']
